<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>라임 LIME — 매일 조금씩 영어</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2316190e'/%3E%3Ccircle cx='50' cy='50' r='34' fill='%23c9f158'/%3E%3Ccircle cx='50' cy='50' r='27' fill='none' stroke='%23f2efe3' stroke-width='3'/%3E%3Cg stroke='%23f2efe3' stroke-width='3'%3E%3Cpath d='M50 23v54M27 36.5l46 27M73 36.5l-46 27'/%3E%3C/g%3E%3Ccircle cx='50' cy='50' r='4.5' fill='%2316190e'/%3E%3C/svg%3E" />
  <script>
  // 클라이언트 에러 비컨 (원격 기기 디버깅용)
  (function () {
    function post(data) {
      try {
        var x = new XMLHttpRequest();
        x.open('POST', '/__err', true);
        x.setRequestHeader('Content-Type', 'text/plain');
        x.send(JSON.stringify(data));
      } catch (e) {}
    }
    window.addEventListener('error', function (e) {
      post({ t: 'error', msg: e.message, src: e.filename, line: e.lineno, col: e.colno, ua: navigator.userAgent });
    }, true);
    window.addEventListener('unhandledrejection', function (e) {
      post({ t: 'rejection', msg: String((e.reason && e.reason.message) || e.reason), ua: navigator.userAgent });
    });
    window.addEventListener('load', function () {
      setTimeout(function () {
        post({ t: 'ping', nodes: document.querySelectorAll('.node').length, nav: document.querySelectorAll('.nav-item').length, ua: navigator.userAgent });
      }, 1500);
    });
  })();
  </script>
</head>
<body>
  <div id="app">
    <aside id="sidebar"></aside>
    <main id="main">
      <div id="topbar"></div>
      <div id="view"></div>
    </main>
    <aside id="rail"></aside>
  </div>
  <nav id="bottomnav"></nav>
  <div id="overlay"></div>
  <div id="toast" role="status" aria-live="polite"></div>
  <script type="module" src="src/app.js"></script>
</body>
</html>
